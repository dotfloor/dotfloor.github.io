---
layout: default
---

{%-include back_link.html-%}

<article class="post-article">
  <p class="post-meta" aria-hidden="true" data-post-date="{{ page.date | date: site.theme_config.date_format }}"></p>
  
  <h1 id="post-title">{{ page.title }}</h1>

  <button class="btn-toggle" id="furigana-toggle" onclick="toggleFurigana()" style="align-self: flex-start;">ふりがな: オン</button>
  <script>
    function toggleFurigana() {
      const isHidden = document.body.classList.toggle('hide-furigana');
      const btn = document.getElementById('furigana-toggle');
      btn.innerText = isHidden ? 'ふりがな: オフ' : 'ふりがな: オン';
      localStorage.setItem('hide-furigana', isHidden);
    }
    // Restore preference on load
    if (localStorage.getItem('hide-furigana') === 'true') {
      document.body.classList.add('hide-furigana');
      document.getElementById('furigana-toggle').innerText = 'ふりがな: オフ';
    }
  </script>

  {{ content }}

  <nav class="post-nav-row" id="post-nav-row" aria-label="Post navigation">
    {%- if page.previous.url -%}
      <a class="btn-toggle btn-post-nav" id="post-nav-prev" href="{{ page.previous.url }}">&larr;</a>
    {%- else -%}
      <span class="btn-toggle btn-post-nav is-disabled" aria-disabled="true">&larr;</span>
    {%- endif -%}

    {%- if page.next.url -%}
      <a class="btn-toggle btn-post-nav" id="post-nav-next" href="{{ page.next.url }}">&rarr;</a>
    {%- else -%}
      <span class="btn-toggle btn-post-nav is-disabled" aria-disabled="true">&rarr;</span>
    {%- endif -%}
  </nav>
  <script>
    // Place post navigation directly above vocabulary when present.
    document.addEventListener('DOMContentLoaded', function () {
      const nav = document.getElementById('post-nav-row');
      const vocab = document.querySelector('.vocab-list-container');
      if (!nav) return;
      if (vocab && vocab.parentNode) {
        vocab.parentNode.insertBefore(nav, vocab);
      }

      const shouldIgnoreShortcuts = (target) => {
        if (!target) return false;
        const tag = target.tagName;
        return target.isContentEditable || tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT';
      };

      document.addEventListener('keydown', function (e) {
        if (e.altKey || e.ctrlKey || e.metaKey || shouldIgnoreShortcuts(e.target)) return;

        const prevLink = document.getElementById('post-nav-prev');
        const nextLink = document.getElementById('post-nav-next');
        const title = document.getElementById('post-title');
        const vocabDetails = document.querySelector('.vocab-list-container details');

        if (e.key === 'ArrowLeft' && prevLink) {
          e.preventDefault();
          window.location.href = prevLink.href;
          return;
        }

        if (e.key === 'ArrowRight' && nextLink) {
          e.preventDefault();
          window.location.href = nextLink.href;
          return;
        }

        if (e.key === '1' && title) {
          e.preventDefault();
          title.click();
          return;
        }

        if (e.key === '2' && typeof window.toggleFurigana === 'function') {
          e.preventDefault();
          window.toggleFurigana();
          return;
        }

        if (e.key === '3' && vocabDetails) {
          e.preventDefault();
          vocabDetails.open = !vocabDetails.open;
        }
      });
    });
  </script>
